<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith</title>
    <link rel="stylesheet" href="../../static/css/courses.css">
    <link rel="stylesheet" href="../../static/css/partials.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body id="main-Body">
    
    <button id="btn-Create" class="nav-btn btn bg-white text-black rounded-4">
        <i class="bi bi-arrow-left me-3"></i>Create Course
    </button>

    <button id="btn-Close" class="nav-btn btn bg-white text-black rounded-4">
        <i class="bi bi-grid-fill me-3"></i>Back
    </button>

    <div id="modal-Wrapper">

        <div class="card-zenith bg-white fade-in">
            <div class="card-body p-4 p-md-5">

                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center mb-4 gap-3">
                    <h1 class="fw-bold m-0 fs-2 text-dark" id="modal-Title">Create your own course:</h1>
                    <button id="submit-btn" type="submit" class="btn btn-dark text-white rounded-pill px-4 py-2 shadow-sm fw-bold transition">
                        <i class="bi bi-rocket-takeoff-fill me-2"></i>Create
                    </button>
                </div>

                <hr class="border-2 opacity-10 mb-4 mb-md-5">

                <div class="row gx-4 gx-lg-5 mb-4">

                    <div class="col-md-6">
                        <h3 class="fw-bold text-dark mb-4 d-flex align-items-center">
                            <i class="bi bi-journal-text me-2 text-primary"></i>General
                        </h3>

                        <div class="mb-3">
                            <label for="title" class="small fw-bold form-label text-secondary">Course Title</label>
                            <input type="text" id="title" class="form-control py-3" placeholder="advanced js" required>
                        </div>

                        <div class="mb-4">
                            <label for="desc" class="small fw-bold form-label text-secondary">Course Description</label>
                            <textarea id="desc" class="form-control py-3" placeholder="Tell us what students will learn..." rows="4" required></textarea>
                        </div>
                    </div>

                    <div class="col-md-6 d-flex flex-column align-items-center mt-5 mt-md-0">
                        <h3 class="fw-bold text-dark mb-4 w-100 text-center text-md-start">
                            <i class="bi bi-layers me-2 text-primary"></i>Modules
                        </h3>

                        <div id="modules-list" class="w-100 flex-grow-1 overflow-y-auto pe-2 d-flex flex-column gap-3 mb-3" style="max-height: 280px; min-height: 180px;">
                            
                        </div>

                        <button id="add-Module" class="btn btn-outline-primary border-2 border-dashed rounded-4 w-100 w-md-75 py-2 fw-bold">
                            <i class="bi bi-plus-circle me-2"></i>Add new module
                        </button>
                    </div>

                </div>


                <div class="row g-4 align-items-end">
                    
                    <div class="col-12">
                        <div class="row g-3">
                            <div class="col-6">
                                <label for="select-Cate" class="small fw-bold form-label text-secondary">Category</label>
                                <select id="select-Cate" class="form-select py-3" required>

                                </select>
                            </div>
                            <div class="col-6">
                                <label for="select-Game" class="small fw-bold form-label text-secondary">Game Mode</label>
                                <select id="select-Game" class="form-select py-3" required>

                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="img-container mb-3 mt-4 w-100 ratio ratio-16x9 d-flex justify-content-center align-items-center overflow-hidden rounded-3" id="preview-Container">
                            <div id="bg-Img-Placeholder" class="d-flex flex-column align-items-center justify-content-center text-secondary">
                                <i class="bi bi-image fs-1 mb-2"></i>
                                <span class="small">No image selected</span>
                            </div>
                        </div>
                        <input type="text" id="course-cover" class="form-control py-3" placeholder="Paste the cover image URL here">
                    </div>

                    <div class="col-12">
                        <div class="form-check form-switch rounded-3 d-flex justify-content-center align-items-center">
                            <input class="form-check-input" type="checkbox" id="course-Public">
                            <label class="form-check-label small fw-bold text-black ms-3" for="course-Public">Make this course public</label>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <div id="footer-container"></div>


    <script type="module" src="../../static/js/partials.js" ></script>
        <script type="module">
        import { loadPartial } from "../../static/js/partials.js";

        document.addEventListener('DOMContentLoaded', async () => {
            await loadPartial('footer-container', "../partials/navbar.html");
        });
    </script>

    <script type="module" src="../../static/js/courses.js"></script>
</body>
</html>
